name: Live provider smoke

# Weekly, non-blocking canary: one real ESPN call + one real
# TheSportsDB call, asserting they still parse (upstream schema drift is
# the main failure mode the hermetic suite cannot catch). Strictly
# separate from ci.yml — this never gates a merge.

on:
  schedule:
    - cron: "17 9 * * 1" # Mondays 09:17 UTC
  workflow_dispatch: {}

jobs:
  smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - run: pip install -r requirements.txt
      - run: python -m tests.live_smoke
