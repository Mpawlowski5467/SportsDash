name: Release desktop app

# Builds the macOS .dmg (PyInstaller-frozen backend sidecar + Tauri
# shell) and attaches it to the GitHub Release for the tag.
#
# NOTE: without an Apple Developer ID the app is unsigned — users must
# right-click → Open past Gatekeeper (see docs/desktop.md, and the
# code-signing item on ROADMAP.md).

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write # create the release + upload the asset

jobs:
  macos-dmg:
    runs-on: macos-latest
    env:
      # Signing/notarization turn on automatically once the repo secrets
      # exist (see docs/desktop.md "Code signing"); until then the build
      # stays unsigned and everything else works as before.
      HAS_APPLE_SIGNING: ${{ secrets.APPLE_CERTIFICATE != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri
      - name: Configure code signing & notarization
        if: env.HAS_APPLE_SIGNING == 'true'
        run: |
          # Tauri v2 reads these env vars natively: it imports the base64
          # .p12 into a temporary keychain, signs with the given identity
          # (hardened runtime), and notarizes + staples via notarytool.
          {
            echo "APPLE_CERTIFICATE<<APPLE_CERT_EOF"
            echo "${{ secrets.APPLE_CERTIFICATE }}"
            echo "APPLE_CERT_EOF"
            echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
            echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}"
            echo "APPLE_ID=${{ secrets.APPLE_ID }}"
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
          } >> "$GITHUB_ENV"

      - name: Build SportsDash.app + .dmg
        run: ./scripts/build-desktop.sh
      - name: Locate artifacts
        id: artifacts
        run: |
          dmg=$(ls frontend/src-tauri/target/release/bundle/dmg/*.dmg | head -1)
          echo "dmg=$dmg" >> "$GITHUB_OUTPUT"
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifacts.outputs.dmg }}
          generate_release_notes: true
      - name: Upload workflow artifact (manual runs)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: SportsDash-dmg
          path: ${{ steps.artifacts.outputs.dmg }}
