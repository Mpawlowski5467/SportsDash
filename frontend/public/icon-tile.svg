<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="SportsDash">
  <!-- Full-bleed ink tile (safe as PWA `maskable`; mark sits in the central
       safe zone) and the apple-touch source — iOS rounds the corners itself. -->
  <rect width="512" height="512" fill="#15171C"/>
  <g transform="translate(97.5,97.5) scale(2.6417)">
    <path d="M60,60 L60,8 A52,52 0 0 1 105,34 Z" fill="#E8643C"/>
    <path d="M60,60 L105,34 A52,52 0 0 1 105,86 Z" fill="#F4F1EC"/>
    <path d="M60,60 L105,86 A52,52 0 0 1 60,112 Z" fill="#C9D14A"/>
    <path d="M60,60 L60,112 A52,52 0 0 1 15,86 Z" fill="#3B6FD4"/>
    <path d="M60,60 L15,86 A52,52 0 0 1 15,34 Z" fill="#F1ECE2"/>
    <path d="M60,60 L15,34 A52,52 0 0 1 60,8 Z" fill="#9A6A43"/>
    <g stroke="#FFFFFF" stroke-width="3" stroke-linecap="round">
      <path d="M60,60 L60,8"/>
      <path d="M60,60 L105,34"/>
      <path d="M60,60 L105,86"/>
      <path d="M60,60 L60,112"/>
      <path d="M60,60 L15,86"/>
      <path d="M60,60 L15,34"/>
    </g>
  </g>
</svg>
